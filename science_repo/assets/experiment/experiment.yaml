schema_version: 1
id: template-experiment
title: Template experiment
stage: idea
owner: unassigned
question: What specific question will this experiment answer?
hypothesis: State a falsifiable prediction and its expected direction.
created_at: 2026-07-10
inputs:
  - path: data/raw/input.csv
    role: immutable source data
execution:
  command: ["{python}", "src/run.py"]
  outputs:
    - artifacts/results.json
acceptance:
  - metric: replace_me
    operator: ">="
    threshold: 0
ethics:
  human_subjects: false
  sensitive_data: false
  notes: Review domain-specific approvals before execution.

