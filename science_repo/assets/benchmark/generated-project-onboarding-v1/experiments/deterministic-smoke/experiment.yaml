schema_version: 1
id: deterministic-smoke
title: Deterministic smoke experiment
stage: designed
owner: benchmark-coordinator
question: Does the deterministic integer input sum to six?
hypothesis: Summing the frozen integers produces total = 6.
created_at: 2026-07-10
inputs:
  - path: data/raw/integers.txt
    role: immutable benchmark input
execution:
  command: ["{python}", "src/run.py"]
  outputs: ["artifacts/results.json"]
acceptance:
  - metric: total
    operator: "=="
    threshold: 6
ethics:
  human_subjects: false
  sensitive_data: false
  notes: Local deterministic benchmark only.
