id: self-bootstrap-cohort-v2
title: Preregistered local-host framework self-study cohort v2
objective: Run a frozen 24-session paired study with unsigned local-host evidence,
  blinded scoring, independent final review, and no dispatch or publication without
  explicit human authorization.
