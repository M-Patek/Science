schema_version: 1
id: self-bootstrap-v2
title: Execute preregistered framework self-bootstrap effectiveness study
objective: Prepare, execute, independently score, analyze, and review a controlled comparison without fabricating observations or bypassing human gates.
status: draft
owner: framework-maintainer
framework_revision_under_test: aa398ebdc13d5cb8d44cc83c5e097faade766da3
human_gates:
  - {id: gate-authorize-execution, trigger: Before subject dispatch or candidate observation creation, approver: project-owner}
  - {id: gate-publish, trigger: Before any publication, approver: independent-human-reviewer}
tasks:
  - id: register-executable-cohort
    role: research-designer
    status: pending
    depends_on: []
    inputs: [experiments/self-bootstrap-effectiveness/protocol.md, experiments/self-bootstrap-effectiveness/cohort-v1.yaml, experiments/self-bootstrap-effectiveness/task-fixtures-v1.yaml]
    outputs: [experiments/self-bootstrap-effectiveness/registration/cohort-freeze.json]
    write_scope: [experiments/self-bootstrap-effectiveness/registration/]
    review_required: true
    human_gate: false
  - id: authorize-and-stage
    role: experiment-operator
    status: pending
    depends_on: [register-executable-cohort]
    inputs: [experiments/self-bootstrap-effectiveness/registration/cohort-freeze.json]
    outputs: [experiments/self-bootstrap-effectiveness/staging/observations-v2.candidate.csv]
    write_scope: [experiments/self-bootstrap-effectiveness/staging/]
    review_required: true
    human_gate: true
  - id: ingest-raw-exclusive
    role: controlled-ingestion-operator
    status: pending
    depends_on: [authorize-and-stage]
    inputs: [experiments/self-bootstrap-effectiveness/staging/observations-v2.candidate.csv]
    outputs: [experiments/self-bootstrap-effectiveness/data/raw/observations-v2.csv, experiments/self-bootstrap-effectiveness/registration/observations-v2.digest.json]
    write_scope: [experiments/self-bootstrap-effectiveness/data/raw/, experiments/self-bootstrap-effectiveness/registration/]
    review_required: true
    human_gate: false
  - id: scorer-a
    role: independent-scorer-a
    status: pending
    depends_on: [ingest-raw-exclusive]
    inputs: [experiments/self-bootstrap-effectiveness/data/raw/observations-v2.csv, experiments/self-bootstrap-effectiveness/rubric.md]
    outputs: [experiments/self-bootstrap-effectiveness/scoring/scorer-a/scores-v1.csv]
    write_scope: [experiments/self-bootstrap-effectiveness/scoring/scorer-a/]
    review_required: true
    human_gate: false
  - id: scorer-b
    role: independent-scorer-b
    status: pending
    depends_on: [ingest-raw-exclusive]
    inputs: [experiments/self-bootstrap-effectiveness/data/raw/observations-v2.csv, experiments/self-bootstrap-effectiveness/rubric.md]
    outputs: [experiments/self-bootstrap-effectiveness/scoring/scorer-b/scores-v1.csv]
    write_scope: [experiments/self-bootstrap-effectiveness/scoring/scorer-b/]
    review_required: true
    human_gate: false
  - id: adjudicate-scores
    role: independent-adjudicator
    status: pending
    depends_on: [scorer-a, scorer-b]
    inputs: [experiments/self-bootstrap-effectiveness/scoring/scorer-a/scores-v1.csv, experiments/self-bootstrap-effectiveness/scoring/scorer-b/scores-v1.csv]
    outputs: [experiments/self-bootstrap-effectiveness/data/derived/adjudicated-v1.csv]
    write_scope: [experiments/self-bootstrap-effectiveness/data/derived/]
    review_required: true
    human_gate: false
  - id: analyze-study
    role: analysis-agent
    status: pending
    depends_on: [adjudicate-scores]
    inputs: [experiments/self-bootstrap-effectiveness/data/derived/adjudicated-v1.csv]
    outputs: [experiments/self-bootstrap-effectiveness/artifacts/results-v1.json, experiments/self-bootstrap-effectiveness/records/]
    write_scope: [experiments/self-bootstrap-effectiveness/artifacts/, experiments/self-bootstrap-effectiveness/records/]
    review_required: true
    human_gate: false
  - id: independent-agent-review
    role: independent-agent-reviewer
    status: pending
    depends_on: [analyze-study]
    inputs: [experiments/self-bootstrap-effectiveness/artifacts/results-v1.json]
    outputs: [campaigns/self-bootstrap-v2/handoffs/independent-agent-review.json]
    write_scope: [campaigns/self-bootstrap-v2/handoffs/]
    review_required: false
    human_gate: false
  - id: human-publication-decision
    role: independent-human-reviewer
    status: pending
    depends_on: [independent-agent-review]
    inputs: [campaigns/self-bootstrap-v2/handoffs/independent-agent-review.json]
    outputs: [campaigns/self-bootstrap-v2/handoffs/independent-human-publication-receipt.json]
    write_scope: [campaigns/self-bootstrap-v2/handoffs/]
    review_required: false
    human_gate: true
