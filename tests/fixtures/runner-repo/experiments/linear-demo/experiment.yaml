schema_version: 1
id: linear-demo
title: Isolated runner integration fixture
stage: testing
owner: tests
question: Can the runner execute and review an isolated deterministic fixture?
hypothesis: The fixture reports zero slope error.
created_at: 2026-07-10
inputs:
  - path: data/raw/points.csv
    role: immutable synthetic fixture
execution:
  command: ["{python}", "src/run.py"]
  outputs:
    - artifacts/results.json
    - artifacts/fit.svg
acceptance:
  - metric: slope_absolute_error
    operator: "<="
    threshold: 1.0e-12
ethics:
  human_subjects: false
  sensitive_data: false
  notes: Test fixture only.
